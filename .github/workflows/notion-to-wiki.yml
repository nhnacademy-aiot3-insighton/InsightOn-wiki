name: Notion to GitHub Wiki Sync

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 설치
        run: npm install @notionhq/client notion-to-md

      - name: Wiki 동기화 버튼 눌린 회의 -> GitHub 이슈 등록
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATA_SOURCE_ID: ${{ secrets.NOTION_DATA_SOURCE_ID }}
          WIKI_SYNC_PAT: ${{ secrets.WIKI_SYNC_PAT }}
        run: node scripts/create-issues-for-requested.js

      - name: Scrum 라벨 이슈 -> 회의록.md 생성
        env:
          WIKI_SYNC_PAT: ${{ secrets.WIKI_SYNC_PAT }}
          ISSUE_REPO: ${{ github.repository }}
          OUTPUT_DIR: wiki-sync-output
        run: node scripts/generate-meeting-log.js

      - name: Notion 회의 DB -> Wiki 문서 동기화
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATA_SOURCE_ID: ${{ secrets.NOTION_DATA_SOURCE_ID }}
          OUTPUT_DIR: wiki-sync-output
        run: node scripts/sync-notion-to-wiki.js

      - name: GitHub Wiki에 반영
        env:
          WIKI_PAT: ${{ secrets.WIKI_SYNC_PAT }}
        run: |
          set -e
          REPO="${{ github.repository }}"
          git clone "https://x-access-token:${WIKI_PAT}@github.com/${REPO}.wiki.git" wiki-repo
          cp -r wiki-sync-output/* wiki-repo/
          cd wiki-repo
          git config user.name "notion-sync-bot"
          git config user.email "actions@github.com"
          git add .
          if git diff --cached --quiet; then
            echo "✅ 변경된 내용이 없습니다."
          else
            git commit -m "docs: Notion 문서 자동 동기화 ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "✅ Wiki에 반영 완료"
          fi